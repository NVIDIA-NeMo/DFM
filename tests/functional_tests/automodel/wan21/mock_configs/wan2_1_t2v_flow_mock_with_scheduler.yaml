# Mock configuration for WAN 2.1 T2V finetuning tests with LR scheduler
# Uses 8 GPUs with mock dataloader for functional testing

seed: 42

wandb:
  project: wan-t2v-flow-matching-mock-test
  mode: disabled  # Disable wandb for testing
  name: wan2_1_t2v_mock_scheduler_test

dist_env:
  backend: nccl
  timeout_minutes: 30

model:
  pretrained_model_name_or_path: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
  mode: finetune

step_scheduler:
  global_batch_size: 8
  local_batch_size: 1
  ckpt_every_steps: 1000  # Won't trigger in short test
  num_epochs: 2
  log_every: 1

data:
  dataloader:
    _target_: dfm.src.automodel.datasets.build_mock_dataloader
    num_workers: 0
    device: cpu
    length: 16  # Small dataset for testing
    num_channels: 16
    num_frame_latents: 16
    spatial_h: 30
    spatial_w: 52
    text_seq_len: 77
    text_embed_dim: 4096

optim:
  learning_rate: 5e-5
  optimizer:
    weight_decay: 0.01
    betas: [0.9, 0.999]

# LR scheduler configuration - testing the new feature
lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 2
  min_lr: 1e-6

flow_matching:
  adapter_type: "simple"
  adapter_kwargs: {}
  timestep_sampling: uniform
  logit_mean: 0.0
  logit_std: 1.0
  flow_shift: 3.0
  mix_uniform_ratio: 0.1

fsdp:
  tp_size: 1
  cp_size: 1
  pp_size: 1
  dp_replicate_size: 1
  dp_size: 8  # 8 GPUs for data parallel

checkpoint:
  enabled: false  # Disable checkpointing for mock tests
  checkpoint_dir: /tmp/wan_scheduler_test/
  model_save_format: torch_save
  save_consolidated: false
  restore_from: null
